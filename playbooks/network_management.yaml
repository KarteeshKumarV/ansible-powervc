      ibm.powervc.network_management:
        login_host: "{{ ipaddress }}"
        login_user: "{{ pvc_user }}"
        login_password: "{{ pvcroot_password }}"
        component: dns
        state: present
        dns_server: "{{ dns_server }}"
        domain_suffix: "{{ domain_suffix }}"
