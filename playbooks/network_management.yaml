---
- name: "PowerVC Network Management - Add Netroute"
  hosts: localhost
  vars_files:
    - ../vars/powervc.yml
    - ../vars/secret.yml

  tasks:
    - name: "Add a network route"
      ibm.powervc.network_management:
        login_host: "{{ ipaddress }}"
        login_user: "{{ pvc_user }}"
        login_password: "{{ pvcroot_password }}"
        component: route
        state: present
        route_type: host
        address: "{{ address }}"
        netmask: "{{ netmask }}"
        gateway: "{{ gateway }}"
        interface: "{{ interface }}"
        position: "{{ position }}"
      register: result

    - name: "Show stdout"
      debug:
        var: result


- name: "PowerVC Network Management - Remove Netroute"
  hosts: localhost
  vars_files:
    - ../vars/powervc.yml
    - ../vars/secret.yml

  tasks:
    - name: "Remove a network route"
      ibm.powervc.network_management:
        login_host: "{{ ipaddress }}"
        login_user: "{{ pvc_user }}"
        login_password: "{{ pvcroot_password }}"
        component: route
        state: absent
        route_type: host
        address: "{{ address }}"
        netmask: "{{ netmask }}"
        gateway: "{{ gateway }}"
        interface: "{{ interface }}"
        position: "{{ position }}"
      register: result

    - name: "Show stdout"
      debug:
        var: result


- name: "PowerVC Network Management - Add Network Interface"
