  - name: PowerVC Create VM Playbook
    hosts: localhost
    gather_facts: no
    vars:
     auth:
      auth_url: https://<POWERVC>:5000/v3
      project_name: PROJECT-NAME
      username: USERID
      password: PASSWORD
      project_domain_name: PROJECT_DOMAIN_NAME
      user_domain_name: USER_DOMAIN_NAME
    tasks:  
      - name: Create a new instance and attaches to a network
        ibm.powervc.server:
          auth: "{{ auth }}"
          name: "NAME"
          image: "IMAGE"
          timeout: 200
          max_count: 1
          collocation_rule_name: "COLLOCATION_RULE_NAME"
          nics:
            - network-name: "NETWORK_NAME"
              fixed_ip: "FIXED_IP"
          validate_certs: false
          flavor: "FLAVOR"
          state: present
        register: result
      - name: Display server info
        debug: var=result


  - name: PowerVC Create VM Playbook with host
    hosts: localhost
    gather_facts: no
    tasks:
      - name: Create a new instance and attaches to a network
        ibm.powervc.server:
          cloud: "CLOUD_NAME"
          name: "VM_NAME"
          image: "VM_IMAGE"
          host: "HOST_ID"
          timeout: 200
          max_count: "COUNT"
          collocation_rule_name: "COLLOCATION_RULE_NAME"
          userdata: |
            #!/bin/sh
            apt update
            apt -y full-upgrade
          nics:
            - network_name: "NETWORK_NAME"
              fixed_ip: "FIXED_IP" # "fixed_ip: 192.168.10.20"
          image_volume_override:
            - volume_id: "VOLUME_ID"
              template_id: "TEMPLATE_ID"
          flavor: "FLAVOR_NAME"
          volume_name: ["VOLUME_1","VOLUME_2"]
          state: present
          validate_certs: false
        register: result
      - name: Disply server info
        debug: var=result

  - name: PowerVC Create VM Playbook with Storage Connectivity Group
    hosts: localhost
    gather_facts: no
    tasks:
      - name: Create a new instance and attaches to a network
        ibm.powervc.server:
          cloud: "CLOUD_NAME"
          name: "VM_NAME"
          image: "VM_IMAGE"
          host: "HOST_ID"
          timeout: 200
          max_count: "COUNT"
          collocation_rule_name: "COLLOCATION_RULE_NAME"
          scg_id: "STORAGE_CONNECTIVITY_GROUP_ID"
          nics:
            - network_name: "NETWORK_NAME"
              fixed_ip: "FIXED_IP" # "fixed_ip: 192.168.10.20"
          image_volume_override:
            - volume_id: "VOLUME_ID"
              template_id: "TEMPLATE_ID"
          flavor: "FLAVOR_NAME"
          volume_name: ["VOLUME_1","VOLUME_2"]
          state: present
          validate_certs: false
        register: result
      - name: Disply server info
        debug: var=result

  - name: PowerVC Delete VM Playbook
    hosts: localhost
    gather_facts: no
    vars:
     auth:
      auth_url: https://<POWERVC>:5000/v3
      project_name: PROJECT-NAME
      username: USERID
      password: PASSWORD
      project_domain_name: PROJECT_DOMAIN_NAME
      user_domain_name: USER_DOMAIN_NAME
    tasks:
      - name: Delete the VM based on the input name provided
        ibm.powervc.server:
          auth: "{{ auth }}"
          name: "VM_NAME"
          state: absent
        register: result
      - name: Disply server info
        debug: var=result

  - name: PowerVC Create VM Playbook with custom VSN
    hosts: localhost
    gather_facts: no
    tasks:
      - name: Create VM with custom VSN
        ibm.powervc.server:
          cloud: "CLOUD_NAME"
          name: "VM_NAME"
          image: "VM_IMAGE"
          flavor: "FLAVOR_NAME"
          host: "HOST_ID"
          virtual_serial_number: "ABCD001"
          nics:
            - network_name: "NETWORK_NAME"
          state: present
          validate_certs: false
        register: result
      - name: Display server info
        debug:
          var: result

  - name: PowerVC Create VM Playbook with auto VSN
    hosts: localhost
    gather_facts: no
    tasks:
      - name: Create VM with auto VSN
        ibm.powervc.server:
          cloud: "CLOUD_NAME"
          name: "VM_NAME"
          image: "VM_IMAGE"
          flavor: "FLAVOR_NAME"
          host: "HOST_ID"
          virtual_serial_number: "auto"
          nics:
            - network_name: "NETWORK_NAME"
          state: present
          validate_certs: false
        register: result
      - name: Display server info
        debug:
          var: result

  - name: PowerVC Create VM Playbook with Persistent memory
    hosts: localhost
    gather_facts: no
    tasks:
      - name: Create VM with auto VSN
        ibm.powervc.server:
          cloud: "CLOUD_NAME"
          name: "VM_NAME"
          image: "VM_IMAGE"
          flavor: "FLAVOR_NAME"
          host: "HOST_ID"
          nics:
            - network_name: "NETWORK_NAME"
          pmem_volume:
           - name: pmem1
             size: 256
             affinity: true
             device: DRAM
           - name: pmem2
             size: 256
             affinity: false
             device: DRAM
          state: present
          validate_certs: false
        register: result
      - name: Display server info
        debug:
          var: result

  - name: Create VM with affinity score
    ibm.powervc.server:
      cloud: CLOUD_NAME
      name: VM_NAME
      image: IMAGE_NAME
      flavor: FLAVOR_NAME
      host: HOST_ID
      affinity:
        score: 80
        action: fail
      nics:
        - network_name: NETWORK_NAME
      state: present