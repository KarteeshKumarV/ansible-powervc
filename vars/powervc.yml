modify_group: "" # New group for user (modify_group: pvcviewer, pvcoperator, pvcsuperadmin)
expiry_days: "" # Password expiry in days


#Powervc Log Variables
service: "" # Service name (e.g., general, network, storage)
action: "" # Action (debug)
modules: "" # Modules (e.g., nova.api.openstack.compute.contrib.flavors)
user_response: "y" # Response to interactive prompt when enabling general service debug: 'y' or 'n'

# Service Management Variables
operation: ""        # Options: start, stop, restart, status, enable, disable, list
remote: false        # Set to true to enable powervc-services remote operation
node: ""             # Options: local, all, or a specific node name
advanced: ""         # Options: component, node, inventory_hostname (restart only)
skip: ""             # Component(s) to skip during start, stop, or restart
output_format: ""    # Options: raw, json, detail

# Scale Config Variables
