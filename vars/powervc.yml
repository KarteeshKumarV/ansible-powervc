# PowerVC OpsMgr Update Variables
update_node: "" # Node hostname/IP for rolling upgrade (required unless using offline_mode)
update_skip_restart: false # Skip restart for tasks with restart tag
update_list_ifixes: false # List applied ifixes from cluster
update_force: false # Force update operation
update_verbose: false # Enable verbose output during update
update_ifix_isopath: "" # Absolute path of ifix ISO file
update_prepare_isopath: "" # Absolute path of ISO for system preparation
update_offline_mode: true # Block API calls during update (no node required)
update_skip_remote_node_upgrade: false # Skip remote node (Novalink, compute, cinder backup) upgrade
update_state: "" # State: present (update/prepare), absent (cleanup)

